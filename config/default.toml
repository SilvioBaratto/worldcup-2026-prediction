# Default pipeline configuration for World Cup 2026 knockout prediction.

[data]
matches_path = "dataset/csv/matches.csv"
teams_path = "dataset/csv/teams.csv"
output_path = "dataset/train_data.csv"
min_date = "2006-01-01"
train_cutoff_date = "2026-06-01"
epsilon = 0.001
matches_start_year = 2006
matches_end_year = 2026
ranking_csv_path = "dataset/csv/ranking.csv"
ranking_start_year = 2006
ranking_end_year = 2026
players_csv_path = "dataset/csv/players.csv"
players_competition = "WC"
match_details_csv_path = "dataset/csv/match_details.csv"
match_details_checkpoint_every = 100

[features]
selected = [
    "GOALS_home",
    "SHOTS_home",
    "SHOTS_ON_TARGET_home",
    "POSSESSION_home",
    "PASS_PCT_home",
    "GOALS_away",
    "SHOTS_away",
    "SHOTS_ON_TARGET_away",
    "POSSESSION_away",
    "PASS_PCT_away",
]
per_team_count = 5

[training]
test_size = 0.3
random_state = 42

[training.svm]
C = 0.1
gamma = 0.1
kernel = "linear"

[training.random_forest]
n_estimators = 500
max_features = "sqrt"
max_depth = 50
bootstrap = true

[training.naive_bayes]
var_smoothing = 1.873817422860383e-07

[distributions]
min_season = 2018
candidates = [
    "norm",
    "t",
    "f",
    "chi",
    "cosine",
    "alpha",
    "beta",
    "gamma",
    "dgamma",
    "dweibull",
    "maxwell",
    "pareto",
    "fisk",
]

[simulation]
n_simulations = 10000
classifier = "naive_bayes"
extra_time_factor = 0.33
random_seed = 42

[visualization]
dpi = 80
style = "seaborn-v0_8"
output_dir = "output/plots"

[client]
delay = 6.0
max_retries = 5
backoff_base = 2.0
timeout = 120
use_custom_headers = true

[hybrid]
rf_n_estimators = 300
gb_n_estimators = 200
gb_learning_rate = 0.05
max_goals = 10
rho = -0.1
test_size = 0.2
random_seed = 42

[ordered_logit]
features = ["elo_diff"]
maxiter = 100
test_size = 0.2
random_seed = 42

[live]
competition = "WC"

[elo]
initial_rating = 1500.0
home_advantage = 100.0
k_friendly = 20
k_qualifier = 30
k_continental = 40
k_world_cup = 60
qualifier_keywords = ["qualification", "qualifying", "qualifier"]
continental_keywords = [
    "Copa América",
    "UEFA Euro",
    "African Cup of Nations",
    "Asian Cup",
    "Gold Cup",
    "Nations League",
]
world_cup_keywords = ["World Cup"]

[poisson]
half_life_days = 365.0
max_goals = 10
rho_init = -0.1
home_adv_init = 0.25
random_seed = 42
optimizer_maxiter = 200

[rf]
n_estimators = 300
test_size = 0.2
random_seed = 42

[odds]
cache_dir = "dataset/odds"
seasons = [2014, 2018, 2022]
source_url = "https://www.oddsportal.com"
request_timeout = 30
user_agent = "Mozilla/5.0 (compatible; worldcup-playoff/1.0)"
enabled = true
fallback_to_cache = true
