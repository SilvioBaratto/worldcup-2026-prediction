# Default pipeline configuration for World Cup 2026 knockout prediction.

[simulation]
# 100k tournaments → Monte-Carlo 95% CI ≈ ±0.3% on title odds; beyond this the
# model/calibration uncertainty dominates the sampling error (see README).
n_simulations = 100000
extra_time_factor = 0.33
random_seed = 42

[visualization]
dpi = 80
style = "seaborn-v0_8"
output_dir = "output/plots"

[client]
delay = 6.0
max_retries = 5
backoff_base = 2.0
timeout = 120
use_custom_headers = true

[hybrid]
rf_n_estimators = 300
gb_n_estimators = 200
gb_learning_rate = 0.05
max_goals = 10
rho = -0.1
test_size = 0.2
random_seed = 42

[live]
competition = "WC"

[elo]
initial_rating = 1500.0
home_advantage = 100.0
k_friendly = 20
k_qualifier = 30
k_continental = 40
k_world_cup = 60
qualifier_keywords = ["qualification", "qualifying", "qualifier"]
continental_keywords = [
    "Copa América",
    "UEFA Euro",
    "African Cup of Nations",
    "Asian Cup",
    "Gold Cup",
    "Nations League",
]
world_cup_keywords = ["World Cup"]

[poisson]
half_life_days = 365.0
max_goals = 10
rho_init = -0.1
home_adv_init = 0.25
random_seed = 42
optimizer_maxiter = 200
# Shrink fitted attack/defence toward an Elo strength prior (0 = pure goals
# model, 1 = pure Elo-shaped). Tuned by match-level RPS over WC2014/18/22:
# pure goals = 0.2195 RPS, w=0.8 = 0.2082 (~5% better, best log-loss); w=1.0
# degrades. 0.8 keeps 20% live-form signal. Re-tune with the WC backtest.
elo_prior_weight = 0.8
# Squad market-value prior (player-level signal), applied after the Elo blend.
# 0.0 = off (default). A modest value (~0.2-0.3) adds the current-squad signal
# (Transfermarkt total squad value). Tune via the WC backtest before enabling.
market_value_prior_weight = 0.0

[rf]
n_estimators = 300
test_size = 0.2
random_seed = 42

[odds]
cache_dir = "dataset/odds"
seasons = [2014, 2018, 2022]
source_url = "https://www.oddsportal.com"
request_timeout = 30
user_agent = "Mozilla/5.0 (compatible; worldcup-playoff/1.0)"
enabled = true
fallback_to_cache = true
